<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Calendar – Interactive Sri Lankan Holiday Calendar | Kalana Sahan</title>
    <meta name="description" content="Interactive 2026 calendar with Sri Lankan public holidays, monthly navigation, and print support. By Kalana Sahan Dillimuni.">
    <meta name="robots" content="index, follow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/tailwind-config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .calendar-day {
            min-height: 90px;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.625rem;
        }
        .calendar-day:hover { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.2); }
        .today { border: 1px solid var(--primary) !important; background: rgba(124,58,237,0.12) !important; }
        .holiday { background: rgba(6,182,212,0.06) !important; border-color: rgba(6,182,212,0.25) !important; }
        .holiday-label { color: #06b6d4; font-size: 0.7rem; margin-top: 4px; font-weight: 500; line-height: 1.2; white-space: normal; }
        @media print {
            body { background: white; color: black; }
            header, footer, .no-print { display: none !important; }
            .calendar-day { border: 1px solid #ccc; background: none !important; }
        }
    </style>
</head>
<body class="bg-darkbg text-lighttext" x-data="calendarApp()">
    <div id="scroll-progress" style="width:0%"></div>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="grid-bg" aria-hidden="true"></div>

    <header id="main-header" role="banner"></header>

    <main class="py-16 pt-28 min-h-screen" id="main-content">
        <section class="container mx-auto px-6 max-w-6xl">

            <!-- Breadcrumb -->
            <nav class="breadcrumb no-print" aria-label="Breadcrumb">
                <a href="../index.html">Home</a>
                <span class="breadcrumb-sep">/</span>
                <a href="../projects.html">Projects</a>
                <span class="breadcrumb-sep">/</span>
                <span class="text-white">2026 Calendar</span>
            </nav>

            <div class="text-center mb-10" data-aos="fade-up">
                <span class="badge badge-purple mb-3">Web Tool</span>
                <h1 class="text-4xl md:text-6xl font-heading font-bold text-white mb-2">2026 Calendar</h1>
                <div class="section-divider"></div>
                <p class="text-gray-400">Interactive calendar with Sri Lankan public holidays highlighted</p>
            </div>
            
            <div class="glass-card rounded-2xl p-6 md:p-8" data-aos="fade-up" data-aos-delay="100">
                <!-- Controls -->
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 no-print gap-4">
                    <button @click="prevMonth" class="btn-outline py-2 px-5 text-sm">
                        <i class="fas fa-chevron-left mr-2"></i> Previous
                    </button>
                    <h2 class="text-2xl font-heading font-bold text-white uppercase tracking-wider" x-text="monthNames[month] + ' ' + year"></h2>
                    <div class="flex gap-2">
                        <button @click="printCalendar" class="btn-outline py-2 px-4 text-sm text-secondary border-secondary/30 hover:bg-secondary/10">
                            <i class="fas fa-print mr-2"></i> Print
                        </button>
                        <button @click="nextMonth" class="btn-outline py-2 px-5 text-sm">
                            Next <i class="fas fa-chevron-right ml-2"></i>
                        </button>
                    </div>
                </div>

                <!-- Grid Header -->
                <div class="grid grid-cols-7 gap-2 mb-3">
                    <template x-for="day in dayNames">
                        <div class="text-center font-bold text-secondary text-xs md:text-sm py-2 border-b border-white/10" x-text="day"></div>
                    </template>
                </div>

                <!-- Days -->
                <div class="grid grid-cols-7 gap-1 md:gap-2">
                    <!-- Blank Days -->
                    <template x-for="blank in blankDays">
                        <div class="calendar-day opacity-10"></div>
                    </template>
                    
                    <!-- Date Cells -->
                    <template x-for="date in noOfDays">
                        <div class="calendar-day p-2 md:p-3 flex flex-col justify-between"
                             :class="{ 'today': isToday(date), 'holiday': isHoliday(date) }">
                            <span class="font-bold text-base md:text-lg" x-text="date" 
                                  :class="{'text-primary': isToday(date), 'text-secondary': isHoliday(date)}"></span>
                            
                            <!-- Holiday Label -->
                            <template x-if="isHoliday(date)">
                                <span class="holiday-label" x-text="getHolidayName(date)"></span>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
            
            <div class="text-center mt-10 no-print" data-aos="fade-up">
                <a href="../projects.html" class="btn-outline">
                    <i class="fas fa-arrow-left"></i> Back to Projects
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="main-footer" class="py-10 no-print" role="contentinfo"></footer>

    <!-- Mobile Nav -->
    <div id="mobile-nav" class="mobile-nav-overlay" role="navigation">
        <button id="close-mobile-nav" class="absolute top-6 right-6 text-3xl text-gray-400 hover:text-white" aria-label="Close"><i class="fas fa-times"></i></button>
        <a href="../index.html" class="mobile-nav-link" onclick="document.getElementById('mobile-nav').classList.remove('open')">Home</a>
        <a href="../zentix.html" class="mobile-nav-link text-gradient-zentix" onclick="document.getElementById('mobile-nav').classList.remove('open')">Zentix</a>
        <a href="../projects.html" class="mobile-nav-link" onclick="document.getElementById('mobile-nav').classList.remove('open')">Projects</a>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        loadHeader('../');
        loadFooter('../');
        document.getElementById('close-mobile-nav').addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('open'));
        AOS.init({ duration: 700, once: true });

        function calendarApp() {
            return {
                month: 0, 
                year: 2026,
                noOfDays: [],
                blankDays: [],
                days: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                dayNames: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                monthNames: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
                
                // Sri Lankan Public Holidays 2026 (Estimated/Example dates)
                holidays: {
                    '1-14': 'Tamil Thai Pongal',
                    '1-15': 'Duruthu Full Moon Poya',
                    '2-4': 'Independence Day',
                    '2-13': 'Navam Full Moon Poya',
                    '2-27': 'Mahasivarathri',
                    '3-14': 'Medin Full Moon Poya',
                    '4-13': 'Sinhala & Tamil New Year',
                    '4-14': 'Sinhala & Tamil New Year',
                    '4-18': 'Good Friday',
                    '5-1': 'May Day',
                    '5-13': 'Vesak Full Moon Poya',
                    '5-14': 'Day following Vesak',
                    '6-11': 'Poson Full Moon Poya',
                    '12-25': 'Christmas Day'
                },

                init() {
                    let today = new Date();
                    this.month = today.getMonth();
                    this.year = 2026; // Default to 2026
                    this.getNoOfDays();
                },

                isToday(date) {
                    const today = new Date();
                    const d = new Date(this.year, this.month, date);
                    return today.toDateString() === d.toDateString();
                },

                // Check if a date is a holiday
                isHoliday(date) {
                    const key = `${this.month + 1}-${date}`;
                    return this.holidays[key] !== undefined;
                },

                getHolidayName(date) {
                     const key = `${this.month + 1}-${date}`;
                     return this.holidays[key];
                },

                getNoOfDays() {
                    let daysInMonth = new Date(this.year, this.month + 1, 0).getDate();
                    let dayOfWeek = new Date(this.year, this.month).getDay();
                    
                    let blankdaysArray = [];
                    for ( var i=1; i <= dayOfWeek; i++) {
                        blankdaysArray.push(i);
                    }

                    let daysArray = [];
                    for ( var i=1; i <= daysInMonth; i++) {
                        daysArray.push(i);
                    }

                    this.blankDays = blankdaysArray;
                    this.noOfDays = daysArray;
                },

                nextMonth() {
                    if (this.month == 11) {
                        this.month = 0;
                        this.year++;
                    } else {
                        this.month++;
                    }
                    this.getNoOfDays();
                },

                prevMonth() {
                    if (this.month == 0) {
                        this.month = 11;
                        this.year--;
                    } else {
                        this.month--;
                    }
                    this.getNoOfDays();
                },
                
                printCalendar() {
                    window.print();
                }
            }
        }
    </script>
</body>
</html>
