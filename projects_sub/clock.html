<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - Kalana Sahan Dillimuni</title>
    <meta name="robots" content="index, follow">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-primary);
            color: #e0e0e0;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .section-divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary, #7c3aed), transparent);
            width: 120px;
            margin: 1.5rem auto 3rem auto;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-darkbg text-lighttext">

    <div id="scroll-progress" style="width:0%"></div>
    <div class="bg-noise" aria-hidden="true"></div><div class="grid-bg" aria-hidden="true"></div>
    <header id="main-header" role="banner"></header>
    <main class="py-16 pt-28 flex justify-center items-center min-h-screen"> 
        <section id="clocks-project" class="container mx-auto px-6 max-w-6xl text-center"> 
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-2" data-aos="fade-up">World Clock</h2> 
            <div class="section-divider" data-aos="fade-up" data-aos-delay="100"></div>
            <p class="text-gray-400 mb-12 max-w-2xl mx-auto" data-aos="fade-up" data-aos-delay="150">A collection of real-time clocks for different time zones around the world.</p>

            <div class="flex flex-wrap justify-center gap-6" id="clock-container" data-aos="zoom-in" data-aos-delay="200">
                <!-- Clock items will be injected here -->
            </div>
         </section>
    </main>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: false, offset: 50 });
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
    <script>
        const timeZones = [
            { name: "New York", timezone: "America/New_York" },
            { name: "London", timezone: "Europe/London" },
            { name: "Sri Lanka", timezone: "Asia/Colombo" },
            { name: "Tokyo", timezone: "Asia/Tokyo" },
            { name: "Sydney", timezone: "Australia/Sydney" }
        ];

        function updateClock() {
            const clockContainer = document.getElementById("clock-container");
            clockContainer.innerHTML = ""; 

            const now = new Date(); 

            timeZones.forEach(zone => {
                try {
                    const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                    const formattedTime = now.toLocaleTimeString("en-US", { timeZone: zone.timezone, ...timeOptions });

                    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
                    const formattedDate = now.toLocaleDateString('en-US', { timeZone: zone.timezone, ...dateOptions });

                    const timeBox = document.createElement("div");
                    // New glass-card styling for the clock boxes
                    timeBox.className = "glass-card p-6 rounded-xl w-64 text-center transform hover:-translate-y-2 transition-all duration-300 border border-white/5 hover:border-primary/50 group"; 

                    timeBox.innerHTML = `
                        <h2 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors">${zone.name}</h2>
                        <p class="text-3xl font-extrabold text-secondary mb-2">${formattedTime}</p>
                        <p class="text-sm text-gray-400 mt-1">${formattedDate}</p> `;

                    clockContainer.appendChild(timeBox);
                } catch (error) {
                    console.error(`Error updating clock for ${zone.name}:`, error);
                }
            });
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
    <footer id="main-footer" class="py-10" role="contentinfo"></footer>
    <div id="mobile-nav" class="mobile-nav-overlay" role="navigation">
        <button id="close-mobile-nav" class="absolute top-6 right-6 text-3xl text-gray-400 hover:text-white" aria-label="Close"><i class="fas fa-times"></i></button>
        <a href="../index.html" class="mobile-nav-link" onclick="document.getElementById('mobile-nav').classList.remove('open')">Home</a>
        <a href="../zentix.html" class="mobile-nav-link text-gradient-zentix" onclick="document.getElementById('mobile-nav').classList.remove('open')">Zentix</a>
        <a href="../projects.html" class="mobile-nav-link" onclick="document.getElementById('mobile-nav').classList.remove('open')">Projects</a>
    </div>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        loadHeader('../');
        loadFooter('../');
        document.getElementById('close-mobile-nav').addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('open'));
    </script>
</body>
</html>
