<body class="bg-darkbg text-lighttext">
    <div id="scroll-progress" style="width:0%"></div>

    <script src="../../assets/js/components.js"></script><script src="../../assets/js/main.js"></script><script src="../../assets/js/subpage.js"></script>
    <script>
        loadHeader('../../'); loadFooter('../../');
        document.getElementById('close-mobile-nav').addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('open'));
        document.addEventListener('DOMContentLoaded', () => {
            renderAppDetail({
                title: 'Z Flow',
                subtitle: 'Smart Ad Skipper & AMOLED Screen Saver',
                description: 'Z Flow uses Android Accessibility Services to automatically detect and click "Skip Ad" buttons on YouTube. Includes a pure black AMOLED overlay so your screen goes dark while audio keeps playing — saving battery and your eyes.',
                isZentix: true,
                playStoreUrl: '',
                downloadUrl: 'https://github.com/kaali-k/Z-Flow/releases/download/v1.0.0/Z.Flow.Latest.apk',
                downloadLabel: 'Download APK',
                badges: [{ label: 'Android', type: 'green' }, { label: 'Accessibility', type: 'purple' }],
                protectWarning: 'Z Flow uses Accessibility Services. Android may show a security prompt when enabling — this is normal. The app collects zero data and works fully offline.',
                features: [
                    { icon: 'fas fa-fast-forward', title: 'Auto Ad Skip', desc: 'Detects and taps "Skip Ad" the instant it appears — no interaction needed.' },
                    { icon: 'fas fa-moon', title: 'AMOLED Black Overlay', desc: 'Pure #000000 overlay saves battery on OLED screens while audio plays.' },
                    { icon: 'fas fa-universal-access', title: 'Accessibility Service', desc: 'Lightweight service that only reads and acts on screen content — nothing else.' },
                    { icon: 'fas fa-eye-slash', title: 'Zero Data Collection', desc: 'No telemetry, no ads, no accounts — everything runs locally.' },
                    { icon: 'fas fa-info-circle', title: 'About & Guide', desc: 'Built-in usage guide explains how to enable Accessibility Services correctly.' }
                ],
                screenshots: [
                    { file: 'Main.jpg', alt: 'Z Flow Main Screen' },
                    { file: 'Skipper.jpg', alt: 'Ad Skipper Active' },
                    { file: 'About.jpg', alt: 'About & Guide' }
                ],
                screenshotDir: 'App7/',
                tech: ['Flutter', 'Dart', 'Kotlin', 'AccessibilityService', 'Overlay API', 'flutter_background_service'],
                backUrl: 'mycreations.html', backLabel: 'Back to My Creations'
            });
        });
    </script>
