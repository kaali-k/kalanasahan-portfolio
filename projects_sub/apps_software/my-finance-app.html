        loadHeader('../../'); loadFooter('../../');
        document.getElementById('close-mobile-nav').addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('open'));
        document.addEventListener('DOMContentLoaded', () => {
            renderAppDetail({
                title: 'MyFinanceApp',
                subtitle: 'Personal Finance & Expense Manager',

                badges: [{ label: 'Android', type: 'green' }, { label: 'Finance', type: 'cyan' }],
                features: [
                    { icon: 'fas fa-wallet', title: 'Income & Expense Tracking', desc: 'Log daily transactions with categories, notes and date filtering.' },
                    { icon: 'fas fa-chart-pie', title: 'Budget Planning', desc: 'Set monthly budgets per category and monitor spending progress.' },
                    { icon: 'fas fa-chart-bar', title: 'Visual Reports', desc: 'Charts and graphs showing spending patterns over custom date ranges.' },
                    { icon: 'fas fa-bell', title: 'Reminders', desc: 'Schedule payment and bill reminders so nothing slips.' },
                    { icon: 'fas fa-sign-in-alt', title: 'Secure Login', desc: 'PIN/password protected access keeps your financial data private.' },
                    { icon: 'fas fa-cog', title: 'Settings & Customization', desc: 'Currency, theme and category customization to fit your workflow.' }
                ],
                screenshots: [
                    { file: 'login.webp', alt: 'Login Screen' },
                    { file: 'dashboard.webp', alt: 'Dashboard' },
                    { file: 'income.webp', alt: 'Income Tracking' },
                    { file: 'expense.webp', alt: 'Expense Tracking' },
                    { file: 'report.webp', alt: 'Reports' },
                    { file: 'reminders.webp', alt: 'Reminders' },
                    { file: 'settingscreen1.webp', alt: 'Settings' },
                    { file: 'settingscreen2.webp', alt: 'Settings 2' },
                    { file: 'rejister.webp', alt: 'Register Screen' }
                ],
                screenshotDir: 'app1/',
                downloadUrl: 'https://github.com/kaali-k/My-Finance-App/releases/download/v1.0.0/Finance.App.apk',
                downloadLabel: 'Download APK',
                tech: ['Flutter', 'Dart', 'SQLite', 'fl_chart', 'Provider', 'Local Notifications'],
                backUrl: 'mycreations.html', backLabel: 'Back to My Creations'
